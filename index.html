<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hong Kong Skyline Souvenir</title>
  <style>
    :root {
      --bg:#f5f5f7;
      --ink:#1d1d1f;
      --muted:#6e6e73;
      --card:rgba(255,255,255,.78);
      --line:rgba(0,0,0,.08);
      --accent:#f8d000;
    }
    * { box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", Segoe UI, sans-serif;
      background:linear-gradient(180deg, #fff 0%, var(--bg) 100%);
      color:var(--ink);
    }
    .app {
      width:100vw;
      height:100vh;
      display:grid;
      grid-template-columns:320px 1fr;
      gap:18px;
      padding:18px;
    }
    aside, #viewer {
      border:1px solid var(--line);
      background:var(--card);
      backdrop-filter:blur(24px);
      border-radius:28px;
      overflow:hidden;
    }
    aside { display:flex; flex-direction:column; padding:24px; }
    h1 { font-size:32px; line-height:1; margin:0 0 12px; letter-spacing:-.04em; }
    p { color:var(--muted); line-height:1.45; }
    label { font-size:13px; margin-top:16px; display:flex; justify-content:space-between; font-weight:700; }
    label span { color:var(--muted); }
    input[type="range"] { width:100%; accent-color:var(--accent); }
    button {
      margin-top:auto;
      padding:14px;
      border-radius:14px;
      border:none;
      background:var(--accent);
      font-weight:bold;
      cursor:pointer;
    }
    #viewer { position:relative; }
    .hint {
      position:absolute;
      right:18px;
      top:18px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      z-index:2;
    }
    @media (max-width:860px) {
      html, body { overflow:auto; }
      .app { height:auto; min-height:100vh; grid-template-columns:1fr; }
      #viewer { height:60vh; min-height:420px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside>
      <h1>Hong Kong Skyline Souvenir</h1>
      <p>The front row is now a simplified 3D-printable Hong Kong landmark skyline, using one dark brown material only.</p>

      <label>Background slats <span id="slatCountText">82</span></label>
      <input id="slatCount" type="range" min="45" max="130" value="82" />

      <label>Slat height <span id="backHeightText">5.2</span></label>
      <input id="backHeight" type="range" min="3.5" max="7" step="0.1" value="5.2" />

      <label>Model depth <span id="depthText">0.28</span></label>
      <input id="depth" type="range" min="0.12" max="0.7" step="0.01" value="0.28" />

      <button id="exportBtn">Export STL</button>
    </aside>

    <section id="viewer"><div class="hint">Drag to rotate · Scroll to zoom</div></section>
  </main>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { STLExporter } from 'https://esm.sh/three@0.160.0/examples/jsm/exporters/STLExporter.js';

    const viewer = document.getElementById('viewer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f7);

    const camera = new THREE.PerspectiveCamera(42, viewer.clientWidth / viewer.clientHeight, 0.1, 100);
    camera.position.set(0, 2.8, 9.5);
    camera.lookAt(0, 1.5, 0);
    controls.target.set(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x777777, 2.8));
    const key = new THREE.DirectionalLight(0xffffff, 2.1);
    key.position.set(3, 6, 5);
    scene.add(key);

    const model = new THREE.Group();
    scene.add(model);

    const brown = new THREE.MeshStandardMaterial({ color:0x6b472f, roughness:.72 });
    const darkBrown = new THREE.MeshStandardMaterial({ color:0x5a3926, roughness:.78 });

    const $ = id => document.getElementById(id);

    function clearGroup(g) {
      while (g.children.length) {
        const o = g.children.pop();
        o.geometry?.dispose?.();
        o.material?.dispose?.();
      }
    }

    function box(g, w, h, d, x, y, z, mat=brown) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      mesh.position.set(x, y + h / 2, z);
      g.add(mesh);
      return mesh;
    }

    function cyl(g, r, h, x, y, z, mat=brown, sides=32) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, sides), mat);
      mesh.position.set(x, y + h / 2, z);
      g.add(mesh);
      return mesh;
    }

    function cone(g, r, h, x, y, z, mat=brown, sides=4) {
      const mesh = new THREE.Mesh(new THREE.ConeGeometry(r, h, sides), mat);
      mesh.position.set(x, y + h / 2, z);
      mesh.rotation.y = Math.PI / 4;
      g.add(mesh);
      return mesh;
    }

    function lineDetail(g, x, y, z, w, h=.025, d=.035) { box(g, w, h, d, x, y, z, darkBrown); }
    function verticalDetail(g, x, y, z, h, w=.025, d=.035) { box(g, w, h, d, x, y, z, darkBrown); }

    function makeIFC(x) {
      const g = new THREE.Group();
      box(g,.55,4.1,.34,0,0,0);
      box(g,.75,.22,.42,0,0,0);
      cone(g,.36,.45,0,4.1,0,brown,4);
      for(let i=0;i<14;i++) lineDetail(g,0,.45+i*.22,.19,.34,.012,.04);
      for(let i=0;i<18;i++) verticalDetail(g,-.18+(i%3)*.18,.65+i*.16,.2,.04,.018,.04);
      g.position.x=x; return g;
    }

    function makeClockTower(x) {
      const g = new THREE.Group();
      box(g,.38,2.45,.34,0,0,0);
      box(g,.55,.12,.4,0,0,0);
      cyl(g,.2,.24,0,2.45,0,brown,24);
      cone(g,.2,.28,0,2.69,0,brown,24);
      box(g,.07,.75,.12,0,2.95,0);
      cyl(g,.09,.035,0,1.15,.2,darkBrown,24);
      for(let i=0;i<5;i++) lineDetail(g,0,.35+i*.25,.2,.24,.015,.04);
      g.position.x=x; return g;
    }

    function makeHSBC(x) {
      const g = new THREE.Group();
      box(g,.85,2.75,.34,0,0,0);
      box(g,1.02,.08,.42,0,2.75,0);
      for(let i=0;i<8;i++) lineDetail(g,0,.35+i*.28,.2,.72,.018,.04);
      for(let i=0;i<5;i++) verticalDetail(g,-.42+i*.21,.2,.2,2.4,.018,.04);
      for(let i=0;i<6;i++) {
        const brace = box(g,.72,.025,.04,0,.55+i*.36,.22,darkBrown);
        brace.rotation.z = i%2 ? .22 : -.22;
      }
      g.position.x=x; return g;
    }

    function makeBankOfChina(x) {
      const g = new THREE.Group();
      box(g,.58,3.35,.36,0,0,0);
      box(g,.38,1.2,.36,-.28,0,0);
      cone(g,.38,.5,0,3.35,0,brown,4);
      box(g,.06,.9,.1,0,3.65,0);
      const xs=[-.2,0,.2];
      xs.forEach(xx=>verticalDetail(g,xx,.25,.22,2.8,.018,.04));
      for(let i=0;i<5;i++) {
        const a=box(g,.7,.025,.04,0,.55+i*.52,.23,darkBrown); a.rotation.z=.55;
        const b=box(g,.7,.025,.04,0,.55+i*.52,.24,darkBrown); b.rotation.z=-.55;
      }
      g.position.x=x; return g;
    }

    function makeJardine(x) {
      const g = new THREE.Group();
      box(g,.72,2.85,.34,0,0,0);
      box(g,.86,.18,.38,0,2.85,0);
      for(let i=0;i<6;i++) verticalDetail(g,-.27+i*.11,.25,.2,2.35,.022,.04);
      for(let i=0;i<4;i++) lineDetail(g,0,3.02+i*.07,.2,.55,.018,.04);
      g.position.x=x; return g;
    }

    function makeCentralPlaza(x) {
      const g = new THREE.Group();
      box(g,.68,3.0,.34,0,0,0);
      cone(g,.43,.55,0,3.0,0,brown,4);
      box(g,.05,.9,.1,0,3.45,0);
      for(let i=0;i<8;i++) verticalDetail(g,-.22+i*.07,.35,.2,2.1,.018,.04);
      for(let i=0;i<3;i++) lineDetail(g,0,.55+i*.85,.2,.42,.022,.04);
      g.position.x=x; return g;
    }

    function makePagoda(x) {
      const g = new THREE.Group();
      for(let i=0;i<7;i++) {
        const y=i*.32;
        box(g,.48-i*.03,.24,.34,0,y,0);
        box(g,.68-i*.04,.045,.42,0,y+.23,0);
      }
      cone(g,.26,.25,0,2.22,0,brown,4);
      box(g,.04,.45,.08,0,2.45,0);
      for(let i=0;i<6;i++) verticalDetail(g,-.15+i*.06,.1,.2,1.9,.012,.03);
      g.position.x=x; return g;
    }

    function makeConvention(x) {
      const g = new THREE.Group();
      box(g,.95,.75,.38,0,0,0);
      const roof = box(g,1.35,.16,.48,0,.75,0);
      roof.rotation.z = -.08;
      box(g,.55,.45,.42,-.38,0,0);
      box(g,.55,.45,.42,.38,0,0);
      for(let i=0;i<6;i++) lineDetail(g,0,.18+i*.09,.23,.7,.012,.035);
      g.position.x=x; return g;
    }

    function makeBuddha(x) {
      const g = new THREE.Group();
      box(g,.7,.22,.38,0,0,0);
      cyl(g,.24,.42,0,.22,0,brown,32);
      cyl(g,.13,.38,0,.62,0,brown,32);
      cyl(g,.18,.16,0,1.0,0,brown,32);
      const head = new THREE.Mesh(new THREE.SphereGeometry(.16,24,16), brown);
      head.position.set(0,1.22,0); g.add(head);
      box(g,.07,.4,.1,-.27,.55,0); box(g,.07,.4,.1,.27,.55,0);
      for(let i=0;i<5;i++) lineDetail(g,0,.08+i*.05,.22,.52,.012,.035);
      g.position.x=x; return g;
    }

    function makeTemple(x) {
      const g = new THREE.Group();
      box(g,1.55,.72,.42,0,0,0);
      box(g,1.75,.12,.5,0,.72,0);
      box(g,.32,.95,.35,-.62,0,0); box(g,.32,.95,.35,.62,0,0);
      box(g,1.8,.16,.54,0,1.0,0);
      cone(g,.34,.22,-.62,1.16,0,brown,4); cone(g,.34,.22,.62,1.16,0,brown,4);
      for(let i=0;i<5;i++) verticalDetail(g,-.55+i*.28,.12,.24,.68,.025,.04);
      for(let i=0;i<4;i++) lineDetail(g,0,.22+i*.12,.24,1.2,.014,.035);
      g.position.x=x; return g;
    }

    function buildModel() {
      clearGroup(model);
      const n = +$('slatCount').value;
      const backH = +$('backHeight').value;
      const d = +$('depth').value;

      $('slatCountText').textContent = n;
      $('backHeightText').textContent = backH.toFixed(1);
      $('depthText').textContent = d.toFixed(2);

      const width = 11.8;
      const gap = width / n;
      const baseH = .22;
      box(model,width+.45,baseH,1.15,0,0,0,brown);

      for (let i=0;i<n;i++) {
        const x = -width/2 + i*gap + gap/2;
        const h = backH - i*.006;
        box(model,gap*.32,h,d*.55,x,baseH,-.28,brown);
      }

            // Keep only major buildings (removed 3 smaller ones) and distribute evenly
      const buildingFns = [
        makeIFC,
        makeClockTower,
        makeHSBC,
        makeBankOfChina,
        makeJardine,
        makeCentralPlaza,
        makeConvention
      ];

      const count = buildingFns.length;
      const spacing = width / (count + 1);
      const buildings = buildingFns.map((fn, i) => {
        const x = -width/2 + spacing * (i + 1);
        return fn(x);
      });
      buildings.forEach(b => { b.position.y = baseH; b.position.z = .2; model.add(b); });
    }

    ['slatCount','backHeight','depth'].forEach(id => $(id).addEventListener('input', buildModel));

    $('exportBtn').onclick = () => {
      const exporter = new STLExporter();
      const stl = exporter.parse(model, { binary:false });
      const blob = new Blob([stl], {type:'model/stl'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'hong-kong-skyline-souvenir.stl';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    function resize(){
      camera.aspect = viewer.clientWidth/viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    }
    function animate(){
      controls.update();
      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    buildModel();
    resize();
    animate();
  </script>
</body>
</html>
